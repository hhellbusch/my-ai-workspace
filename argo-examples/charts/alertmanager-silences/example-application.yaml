---
# Example: alertmanager-silences Application using the multiple-sources pattern
#
# One Application per cluster (or generated by an ApplicationSet).
# Source 0 is the chart; source 1 is the group values ref used to pull in
# the correct silence list for this cluster's environment tier.
#
# Values are applied left-to-right; the last file wins for scalar keys.
# For the `silences` and `inhibitRules` arrays, Helm replaces the entire
# array — so each group-values file must be self-contained (include both
# inherited and environment-specific silences). See the note in README.md
# about mustMergeOverwrite and Helm array semantics.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager-silences-prod-cluster
  namespace: argocd
  labels:
    component: monitoring
    tier: production
  annotations:
    description: "Permanent Alertmanager silences for prod-cluster"
spec:
  project: default

  sources:
    # Source 0: The silences Helm chart
    - repoURL: https://github.com/your-org/your-repo.git
      targetRevision: main
      path: argo-examples/charts/alertmanager-silences
      helm:
        valueFiles:
          - values.yaml                                  # Chart defaults (empty silences list)
          - $cluster-values/group-values/production.yaml # Group-tier overrides
          # Optional: add a cluster-specific file for one-off silences
          # - $cluster-values/clusters/prod-cluster/alertmanager-silences.yaml

    # Source 1: Values repository reference
    - repoURL: https://github.com/your-org/your-repo.git
      targetRevision: main
      path: argo-examples/charts/alertmanager-silences  # or a dedicated values repo path
      ref: cluster-values

  destination:
    server: https://api.prod.example.com:6443
    namespace: openshift-monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # openshift-monitoring already exists

---
# Example: ApplicationSet that generates one Application per cluster,
# reading the environment tier from a cluster label to select the right
# group-values file.
#
# Clusters must be labelled in ArgoCD:
#   argocd cluster set <server> --label tier=production
#   argocd cluster set <server> --label tier=non-production

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: alertmanager-silences
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: tier
              operator: In
              values: [production, non-production]
  template:
    metadata:
      name: "alertmanager-silences-{{name}}"
      labels:
        component: monitoring
        tier: "{{metadata.labels.tier}}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/your-org/your-repo.git
          targetRevision: main
          path: argo-examples/charts/alertmanager-silences
          helm:
            valueFiles:
              - values.yaml
              # Selects production.yaml or non-production.yaml based on cluster label
              - "$cluster-values/group-values/{{metadata.labels.tier}}.yaml"
        - repoURL: https://github.com/your-org/your-repo.git
          targetRevision: main
          path: argo-examples/charts/alertmanager-silences
          ref: cluster-values
      destination:
        server: "{{server}}"
        namespace: openshift-monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
