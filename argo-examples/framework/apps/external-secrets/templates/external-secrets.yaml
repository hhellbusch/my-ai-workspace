{{/*
external-secrets.yaml

Deploys:
  1. External Secrets Operator subscription (OLM)
  2. ClusterSecretStore backed by Vault
     - Supports kubernetes auth (preferred) or token auth

The ClusterSecretStore makes Vault available cluster-wide. Other apps create
ExternalSecret resources that reference this store to pull secrets (e.g.
BMC credentials for BareMetalHosts, TLS certs, pull secrets).
*/}}

{{- if .Values.cluster.features.externalSecrets.enabled }}

---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: external-secrets-operator
  namespace: {{ .Values.eso.namespace }}
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
spec:
  channel: stable
  installPlanApproval: Automatic
  name: external-secrets-operator
  source: community-operators
  sourceNamespace: openshift-marketplace

---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.eso.namespace }}
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}

---
# ClusterSecretStore — cluster-wide Vault backend
# All ExternalSecret resources across all namespaces can reference this store.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      version: {{ .Values.vault.version | quote }}
      {{- if eq .Values.vault.authMethod "kubernetes" }}
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.kubernetesAuth.mountPath }}
          role: {{ include "external-secrets.vaultRole" . | quote }}
          serviceAccountRef:
            name: external-secrets
            namespace: {{ .Values.eso.namespace }}
      {{- else if eq .Values.vault.authMethod "token" }}
      auth:
        tokenSecretRef:
          name: {{ .Values.vault.tokenAuth.secretName }}
          key: {{ .Values.vault.tokenAuth.secretKey }}
          namespace: {{ .Values.eso.namespace }}
      {{- end }}

{{- else }}
# external-secrets is disabled for cluster {{ include "external-secrets.clusterName" . }}
{{- end }}
