---
# cluster.yaml — example-nonprod-dev-1
#
# Non-production development cluster running OCP 4.15 on vSphere.
# Opts into: cert-manager, cluster-monitoring, cluster-logging
# (dev clusters get everything for testing purposes)
#
# Apply labels to the ManagedCluster resource:
#   oc label managedcluster example-nonprod-dev-1 \
#     group.env=non-production \
#     group.ocp-version=4.15 \
#     group.region=us-east \
#     group.network=ovn-kubernetes \
#     app.enabled/cert-manager=true \
#     app.enabled/cluster-logging=true

cluster:
  name: example-nonprod-dev-1
  displayName: "Non-Production Dev-1"
  serverURL: "https://api.example-nonprod-dev-1.example.com:6443"

  groups:
    env: non-production
    ocpVersion: "4.15"
    region: us-east
    network: ovn-kubernetes
    custom: ""

  apps:
    enabled:
      cert-manager: true
      cluster-logging: true
    disabled: {}

  managedClusterLabels:
    group.env: non-production
    group.ocp-version: "4.15"
    group.region: us-east
    group.network: ovn-kubernetes
    app.enabled/cert-manager: "true"
    app.enabled/cluster-logging: "true"
