---
# external-secrets ApplicationSet
#
# MODEL: OPT-IN
# Clusters must have label: app.enabled/external-secrets: "true"
#
# This is a foundational app — other apps (baremetal-hosts, cert-manager)
# depend on the ClusterSecretStore it creates. Enable this first.
#
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets
  namespace: openshift-gitops
  labels:
    component: fleet-management
    app: external-secrets
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true

  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: group.env
              operator: In
              values:
                - non-production
        - matchExpressions:
            - key: group.env
              operator: In
              values:
                - production

  generators:
    - clusters:
        selector:
          matchLabels:
            app.enabled/external-secrets: "true"

  template:
    metadata:
      name: "external-secrets-{{name}}"
      namespace: openshift-gitops
      labels:
        component: fleet-management
        app: external-secrets
        cluster: "{{name}}"
        env: "{{metadata.labels.group.env}}"
      annotations:
        fleet.cluster-name: "{{name}}"
        fleet.app: external-secrets
        # Deploy ESO before apps that depend on it
        argocd.argoproj.io/sync-wave: "-3"
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: default

      sources:
        - repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
          targetRevision: main
          path: argo-examples/framework/apps/external-secrets
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - values.yaml
              - $cluster-values/groups/all/values.yaml
              - $cluster-values/groups/env-{{metadata.labels.group.env}}/values.yaml
              - $cluster-values/groups/ocp-{{metadata.labels.group.ocp-version}}/values.yaml
              - $cluster-values/groups/infra-{{metadata.labels.group.infra}}/values.yaml
              - $cluster-values/groups/region-{{metadata.labels.group.region}}/values.yaml
              - $cluster-values/groups/{{metadata.labels.group.custom}}/values.yaml
              - $cluster-values/clusters/{{name}}/values.yaml

        - repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
          targetRevision: main
          path: argo-examples/framework
          ref: cluster-values

      destination:
        server: "{{server}}"
        namespace: external-secrets

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
