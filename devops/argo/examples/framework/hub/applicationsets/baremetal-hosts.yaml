---
# baremetal-hosts ApplicationSet
#
# MODEL: OPT-IN (only bare metal clusters)
# Clusters must have label: app.enabled/baremetal-hosts: "true"
#
# DEPENDENCY: Requires external-secrets app to be deployed first
# (it creates the ClusterSecretStore that BMC ExternalSecrets reference).
#
# This ApplicationSet renders BareMetalHost + ExternalSecret resources
# for every worker defined in clusters/<name>/values.yaml under
# cluster.baremetal.workers[].
#
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: baremetal-hosts
  namespace: openshift-gitops
  labels:
    component: fleet-management
    app: baremetal-hosts
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true

  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: group.env
              operator: In
              values:
                - non-production
        - matchExpressions:
            - key: group.env
              operator: In
              values:
                - production

  generators:
    - clusters:
        selector:
          matchLabels:
            app.enabled/baremetal-hosts: "true"

  template:
    metadata:
      name: "baremetal-hosts-{{name}}"
      namespace: openshift-gitops
      labels:
        component: fleet-management
        app: baremetal-hosts
        cluster: "{{name}}"
        env: "{{metadata.labels.group.env}}"
      annotations:
        fleet.cluster-name: "{{name}}"
        fleet.app: baremetal-hosts
        # Deploy after external-secrets (-3) but before workloads
        argocd.argoproj.io/sync-wave: "-1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: default

      sources:
        - repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
          targetRevision: main
          path: argo-examples/framework/apps/baremetal-hosts
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - values.yaml
              - $cluster-values/groups/all/values.yaml
              - $cluster-values/groups/env-{{metadata.labels.group.env}}/values.yaml
              - $cluster-values/groups/ocp-{{metadata.labels.group.ocp-version}}/values.yaml
              - $cluster-values/groups/infra-{{metadata.labels.group.infra}}/values.yaml
              - $cluster-values/groups/region-{{metadata.labels.group.region}}/values.yaml
              - $cluster-values/groups/{{metadata.labels.group.custom}}/values.yaml
              - $cluster-values/clusters/{{name}}/values.yaml

        - repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
          targetRevision: main
          path: argo-examples/framework
          ref: cluster-values

      destination:
        server: "{{server}}"
        namespace: openshift-machine-api

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 10m

      ignoreDifferences:
        # Metal3 operator manages these status fields
        - group: metal3.io
          kind: BareMetalHost
          jsonPointers:
            - /spec/online
            - /status
