---
# cluster-label-sync Application
#
# NOT an ApplicationSet — this is a plain Application that runs on the hub only.
# It deploys the cluster-label-sync Helm chart which generates RHACM Policies
# to enforce ManagedCluster labels from Git.
#
# Sync wave: -5 (runs before per-app ApplicationSets at wave 0, so labels
# are in place before apps try to match on them).
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-label-sync
  namespace: openshift-gitops
  labels:
    component: fleet-management
    app: cluster-label-sync
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Source 0: The cluster-label-sync Helm chart
    - repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
      targetRevision: main
      path: argo-examples/framework/hub/rhacm/cluster-labels
      helm:
        ignoreMissingValueFiles: true
        valueFiles:
          - values.yaml
          # Overlay with the aggregated cluster config generated by CI
          # (if using the CI aggregation pattern, otherwise values.yaml
          # contains the full cluster list)
          - $cluster-values/hub/rhacm/cluster-labels/values.yaml

    # Source 1: Values ref for overlaying generated config
    - repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
      targetRevision: main
      path: argo-examples/framework
      ref: cluster-values

  destination:
    server: https://kubernetes.default.svc
    namespace: open-cluster-management-global-set

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
