# onboard-cluster.yaml
#
# Automated cluster onboarding workflow. Triggered manually from the
# GitHub Actions UI. Performs the full onboarding lifecycle:
#
#   1. Generate cluster config files from template
#   2. Run the Ansible onboarding playbook (vault secrets, integrations)
#   3. Aggregate cluster labels into the label-sync chart
#   4. Commit all files and open a PR
#
# The PR goes through the normal promotion pipeline (lab → dev → prod).

name: Onboard New Cluster

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Cluster name (e.g. prod-east-2)'
        required: true
        type: string
      environment:
        description: 'Environment tier'
        required: true
        type: choice
        options:
          - production
          - non-production
      ocp_version:
        description: 'OpenShift version'
        required: true
        type: choice
        options:
          - "4.14"
          - "4.15"
          - "4.16"
      region:
        description: 'Region'
        required: true
        type: choice
        options:
          - us-east
          - us-west
          - eu-west
      server_url:
        description: 'Cluster API server URL (e.g. https://api.prod-east-2.example.com:6443)'
        required: true
        type: string
      infrastructure:
        description: 'Infrastructure platform'
        required: true
        type: choice
        options:
          - baremetal
          - vsphere
          - aws
          - gcp
          - azure
      ingress_domain:
        description: 'Ingress domain (e.g. apps.prod-east-2.example.com)'
        required: true
        type: string
      storage_class:
        description: 'Default storage class'
        required: true
        type: string
      enabled_apps:
        description: 'Comma-separated list of opt-in apps to enable (e.g. cert-manager,cluster-logging)'
        required: false
        type: string
        default: 'cert-manager'
      run_ansible:
        description: 'Run Ansible onboarding playbook (vault, integrations)'
        required: false
        type: boolean
        default: true

env:
  FRAMEWORK_PATH: argo-examples/framework

jobs:
  onboard:
    name: Onboard ${{ github.event.inputs.cluster_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          cluster_name="${{ github.event.inputs.cluster_name }}"

          # Check cluster doesn't already exist
          if [ -d "${{ env.FRAMEWORK_PATH }}/clusters/$cluster_name" ]; then
            echo "ERROR: Cluster $cluster_name already exists"
            exit 1
          fi

          # Validate cluster name format (lowercase, alphanumeric, hyphens)
          if ! echo "$cluster_name" | grep -qE '^[a-z0-9][a-z0-9-]*[a-z0-9]$'; then
            echo "ERROR: Cluster name must be lowercase alphanumeric with hyphens"
            exit 1
          fi

      - name: Generate cluster config from template
        run: |
          cluster_name="${{ github.event.inputs.cluster_name }}"
          cluster_dir="${{ env.FRAMEWORK_PATH }}/clusters/$cluster_name"

          # Copy template
          cp -r "${{ env.FRAMEWORK_PATH }}/clusters/_template" "$cluster_dir"

          # Build enabled apps labels
          enabled_apps="${{ github.event.inputs.enabled_apps }}"
          app_enabled_labels=""
          app_enabled_yaml=""
          if [ -n "$enabled_apps" ]; then
            IFS=',' read -ra apps <<< "$enabled_apps"
            for app in "${apps[@]}"; do
              app=$(echo "$app" | xargs)  # trim whitespace
              app_enabled_labels="${app_enabled_labels}    app.enabled/${app}: \"true\"\n"
              app_enabled_yaml="${app_enabled_yaml}      ${app}: true\n"
            done
          fi

          # Generate cluster.yaml
          cat > "$cluster_dir/cluster.yaml" <<EOF
          ---
          # cluster.yaml — $cluster_name
          #
          # Auto-generated by the onboarding pipeline.
          # Modify as needed, then let the promotion pipeline handle deployment.

          cluster:
            name: $cluster_name
            displayName: "$cluster_name"
            serverURL: "${{ github.event.inputs.server_url }}"

            groups:
              env: ${{ github.event.inputs.environment }}
              ocpVersion: "${{ github.event.inputs.ocp_version }}"
              region: ${{ github.event.inputs.region }}
              network: ovn-kubernetes
              custom: ""

            apps:
              enabled:
          $(printf "$app_enabled_yaml")
              disabled: {}

            managedClusterLabels:
              group.env: ${{ github.event.inputs.environment }}
              group.ocp-version: "${{ github.event.inputs.ocp_version }}"
              group.region: ${{ github.event.inputs.region }}
              group.network: ovn-kubernetes
          $(printf "$app_enabled_labels")
          EOF

          # Generate values.yaml
          cat > "$cluster_dir/values.yaml" <<EOF
          # values.yaml — $cluster_name (HIGHEST PRIORITY overrides)
          #
          # Auto-generated by the onboarding pipeline.

          cluster:
            name: $cluster_name
            displayName: "$cluster_name"
            environment: ${{ github.event.inputs.environment }}
            region: ${{ github.event.inputs.region }}

            ocp:
              version: "${{ github.event.inputs.ocp_version }}"
              infrastructure: ${{ github.event.inputs.infrastructure }}
              controlPlane:
                replicas: 3

            networking:
              ingressDomain: "${{ github.event.inputs.ingress_domain }}"
              networkType: OVNKubernetes

            storage:
              defaultStorageClass: ${{ github.event.inputs.storage_class }}

            features:
              certManager:
                enabled: $(echo "$enabled_apps" | grep -q "cert-manager" && echo "true" || echo "false")
              monitoring:
                enabled: true
              logging:
                enabled: $(echo "$enabled_apps" | grep -q "cluster-logging" && echo "true" || echo "false")

            custom: {}
          EOF

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Aggregate cluster labels
        run: |
          bash ${{ env.FRAMEWORK_PATH }}/pipelines/github-actions/aggregate-cluster-config.sh \
            ${{ env.FRAMEWORK_PATH }}

      # ── Ansible Onboarding (optional) ──────────────────────────────────
      - name: Set up Python for Ansible
        if: github.event.inputs.run_ansible == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        if: github.event.inputs.run_ansible == 'true'
        run: pip install ansible kubernetes

      - name: Run Ansible onboarding playbook
        if: github.event.inputs.run_ansible == 'true'
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
          CLUSTER_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CLUSTER_SERVER_URL: ${{ github.event.inputs.server_url }}
          CLUSTER_INGRESS_DOMAIN: ${{ github.event.inputs.ingress_domain }}
        run: |
          ansible-playbook \
            ${{ env.FRAMEWORK_PATH }}/automation/ansible/onboard-cluster.yaml \
            -e "cluster_name=${{ github.event.inputs.cluster_name }}" \
            -e "cluster_environment=${{ github.event.inputs.environment }}" \
            -e "cluster_server_url=${{ github.event.inputs.server_url }}" \
            -e "cluster_ingress_domain=${{ github.event.inputs.ingress_domain }}" \
            -e "cluster_region=${{ github.event.inputs.region }}" \
            -e "cluster_ocp_version=${{ github.event.inputs.ocp_version }}" \
            -e "cluster_storage_class=${{ github.event.inputs.storage_class }}"

      # ── Commit and PR ──────────────────────────────────────────────────
      - name: Create branch and commit
        run: |
          cluster_name="${{ github.event.inputs.cluster_name }}"
          branch="onboard/$cluster_name"

          git checkout -b "$branch"
          git add "${{ env.FRAMEWORK_PATH }}/clusters/$cluster_name/"
          git add "${{ env.FRAMEWORK_PATH }}/hub/rhacm/cluster-labels/values.yaml"

          git config user.name "Fleet Onboarding Bot"
          git config user.email "fleet-onboarding@example.com"
          git commit -m "feat: onboard cluster $cluster_name

          Environment: ${{ github.event.inputs.environment }}
          OCP Version: ${{ github.event.inputs.ocp_version }}
          Region: ${{ github.event.inputs.region }}
          Infrastructure: ${{ github.event.inputs.infrastructure }}
          Apps: ${{ github.event.inputs.enabled_apps }}"

          git push origin "$branch"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cluster_name="${{ github.event.inputs.cluster_name }}"

          gh pr create \
            --base main \
            --head "onboard/$cluster_name" \
            --title "Onboard cluster: $cluster_name" \
            --body "## New Cluster Onboarding

          **Cluster:** $cluster_name
          **Environment:** ${{ github.event.inputs.environment }}
          **OCP Version:** ${{ github.event.inputs.ocp_version }}
          **Region:** ${{ github.event.inputs.region }}
          **Infrastructure:** ${{ github.event.inputs.infrastructure }}
          **Storage Class:** ${{ github.event.inputs.storage_class }}
          **Apps Enabled:** ${{ github.event.inputs.enabled_apps }}

          ### Generated Files:
          - \`clusters/$cluster_name/cluster.yaml\` — cluster identity and group labels
          - \`clusters/$cluster_name/values.yaml\` — cluster-specific value overrides
          - \`hub/rhacm/cluster-labels/values.yaml\` — updated label aggregation

          ### Ansible Onboarding:
          $([ '${{ github.event.inputs.run_ansible }}' = 'true' ] && echo '✅ Completed' || echo '⏭️ Skipped')

          ### Next Steps:
          1. Review the generated config files
          2. Merge this PR (deploys to lab)
          3. Promote through dev → staging → production via the Promote workflow"
