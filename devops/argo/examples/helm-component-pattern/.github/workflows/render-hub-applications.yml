name: Render hub Applications

# Triggers: any change to the cluster inventory, group values, or cluster
# overrides re-renders the hub Applications and commits the updated output.
# The GitHub Action is the "render step" for the hub-bootstrap chart — it
# breaks the chicken-and-egg by generating hub/rendered/hub-applications.yaml
# before Argo CD needs to apply it.

on:
  push:
    branches:
      - main
    paths:
      - 'devops/argo/examples/helm-component-pattern/clusters.yaml'
      - 'devops/argo/examples/helm-component-pattern/groups/**'
      - 'devops/argo/examples/helm-component-pattern/clusters/**'
      - 'devops/argo/examples/helm-component-pattern/charts/hub-bootstrap/**'
      - 'devops/argo/examples/helm-component-pattern/charts/hub-clusters/**'

  # Allow manual trigger — useful when testing a new hub or onboarding.
  workflow_dispatch:

jobs:
  render-hub-applications:
    name: Render hub Applications from clusters.yaml
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the rendered output

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history so git commit works correctly.
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Render hub Applications
        working-directory: devops/argo/examples/helm-component-pattern
        run: |
          mkdir -p hub/rendered

          # Render the hub-bootstrap chart against clusters.yaml.
          # The chart groups clusters by hub and generates one Argo CD
          # Application per hub with a valueFiles list derived automatically.
          {
            echo "# Generated by charts/hub-bootstrap — do not edit by hand."
            echo "# Source: clusters.yaml"
            echo "# Rendered by: .github/workflows/render-hub-applications.yml"
            echo "# Re-render locally: helm template hub-bootstrap charts/hub-bootstrap --values clusters.yaml"
            echo ""
            helm template hub-bootstrap charts/hub-bootstrap \
              --values clusters.yaml
          } > hub/rendered/hub-applications.yaml

          echo "=== Rendered hub Applications ==="
          cat hub/rendered/hub-applications.yaml

      - name: Validate rendered YAML
        # Basic YAML syntax check — replace with kubeval or conftest for schema validation.
        run: |
          python3 -c "
          import yaml, sys
          with open('devops/argo/examples/helm-component-pattern/hub/rendered/hub-applications.yaml') as f:
              docs = list(yaml.safe_load_all(f))
          apps = [d for d in docs if d]
          print(f'Rendered {len(apps)} Application(s):')
          for app in apps:
              print(f'  {app[\"metadata\"][\"name\"]} (hub={app[\"metadata\"][\"labels\"][\"hub\"]})')
          "

      - name: Commit rendered hub Applications
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add devops/argo/examples/helm-component-pattern/hub/rendered/

          # Only commit if there are actual changes.
          if git diff --staged --quiet; then
            echo "No changes to hub Applications — skipping commit."
          else
            git commit -m "chore(argo): re-render hub Applications from clusters.yaml [skip ci]"
            git push
          fi
