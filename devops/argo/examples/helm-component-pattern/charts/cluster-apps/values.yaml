# Default values — do not define component-* keys here.
# All component-* keys come from group and cluster values files loaded by the
# render script at template time.

argocd:
  namespace: openshift-gitops
  project: default

source:
  repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
  targetRevision: main
  # Path prefix to individual component Helm charts within the repo.
  componentsBasePath: devops/argo/examples/helm-component-pattern/components

destination:
  # Default destination server — overridden per cluster by component-<clusterName>.cluster.server
  server: https://kubernetes.default.svc
