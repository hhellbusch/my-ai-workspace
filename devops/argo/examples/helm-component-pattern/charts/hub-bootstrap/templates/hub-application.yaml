{{- /*
  hub-bootstrap / hub-application.yaml
  ═════════════════════════════════════

  Generates one Argo CD Application per hub found in clusters.yaml.

  ── Hub discovery ────────────────────────────────────────────────────────────

  The template groups the clusters list by hub name.  Every distinct hub value
  in clusters.yaml produces one Application, named global-root-<hubName>.

  ── valueFiles derivation ────────────────────────────────────────────────────

  For each hub the template builds the correct valueFiles list automatically:
    1. clusters.yaml — always first (provides .Values.clusters to global-root)
    2. groups/<name>/values.yaml — for every group referenced by any cluster
       on this hub, in the order declared in hubConfig.<hubName>.groupOrder
    3. clusters/<name>/values.yaml — for every cluster on this hub

  This means adding a cluster to clusters.yaml automatically updates the hub
  Application's valueFiles without any manual edit.  The GitHub Action renders
  this chart and commits hub/rendered/hub-applications.yaml whenever
  clusters.yaml, groups/*, or clusters/* change.

  ── Group order ───────────────────────────────────────────────────────────────

  Group load order determines mustMergeOverwrite priority (later = higher
  priority).  Order is taken from hubConfig.<hubName>.groupOrder in clusters.yaml.
  This makes the priority explicit and independent of cluster listing order —
  adding a new cluster with a new group order does not silently change priority.

  If hubConfig is absent the template falls back to first-occurrence order across
  the hub's cluster list (original behaviour), but logs a warning in the rendered
  YAML annotations so the operator knows to add a hubConfig entry.

*/ -}}

{{- /* ── Step 1: Group clusters by hub ──────────────────────────────────────── */ -}}
{{- $hubs := dict -}}
{{- range .Values.clusters -}}
  {{- $hubName := .hub -}}
  {{- if not (hasKey $hubs $hubName) -}}
    {{- $_ := set $hubs $hubName list -}}
  {{- end -}}
  {{- $_ := set $hubs $hubName (append (index $hubs $hubName) .) -}}
{{- end -}}

{{- /* ── Step 2: Generate one Application per hub ──────────────────────────── */ -}}
{{- range $hubName, $hubClusters := $hubs -}}

{{- /*
  Resolve group order.
  Prefer hubConfig.<hubName>.groupOrder (explicit); fall back to first-occurrence
  across the hub's cluster list (implicit — order depends on cluster listing order).
*/ -}}
{{- $hubConfig := $.Values.hubConfig | default dict -}}
{{- $thisCfg := index $hubConfig $hubName | default dict -}}
{{- $explicitOrder := get $thisCfg "groupOrder" | default list -}}
{{- $hubGroups := list -}}
{{- $orderSource := "" -}}
{{- if $explicitOrder -}}
  {{- $hubGroups = $explicitOrder -}}
  {{- $orderSource = "explicit" -}}
{{- else -}}
  {{- range $hubClusters -}}
    {{- range .groups -}}
      {{- if not (has . $hubGroups) -}}
        {{- $hubGroups = append $hubGroups . -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
  {{- $orderSource = "implicit-WARNING-add-hubConfig-groupOrder-to-clusters.yaml" -}}
{{- end -}}

{{- $prefix := $.Values.source.valueFilesPrefix -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: global-root-{{ $hubName }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    managed-by: hub-bootstrap
    hub: {{ $hubName }}
  annotations:
    # Human-readable cluster list — not consumed by Argo CD.
    hub-bootstrap/clusters: "{{ range $i, $c := $hubClusters }}{{ if $i }}, {{ end }}{{ $c.name }}{{ end }}"
    hub-bootstrap/groups: "{{ join ", " $hubGroups }}"
    hub-bootstrap/group-order-source: "{{ $orderSource }}"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}

  source:
    repoURL: {{ $.Values.source.repoURL }}
    targetRevision: {{ $.Values.source.targetRevision }}
    path: {{ $.Values.source.globalRootChartPath }}

    helm:
      parameters:
        - name: currentHub
          value: {{ $hubName }}

      # valueFiles are relative to the chart source path (charts/global-root/).
      # All entries are derived from clusters.yaml — no manual list maintenance.
      ignoreMissingValueFiles: true
      valueFiles:
        # 1. Cluster inventory — must be first; provides .Values.clusters to global-root
        - {{ $prefix }}/clusters.yaml
        # 2. Group values files — one per unique group across all hub clusters
        {{- range $hubGroups }}
        - {{ $prefix }}/groups/{{ . }}/values.yaml
        {{- end }}
        # 3. Cluster-specific overrides — one per cluster on this hub
        {{- range $hubClusters }}
        - {{ $prefix }}/clusters/{{ .name }}/values.yaml
        {{- end }}

  destination:
    server: {{ $.Values.destination.server }}
    namespace: {{ $.Values.argocd.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
{{- end -}}
