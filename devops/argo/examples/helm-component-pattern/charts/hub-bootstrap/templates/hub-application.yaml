{{- /*
  hub-bootstrap / hub-application.yaml
  ═════════════════════════════════════

  Generates one Argo CD Application per hub found in clusters.yaml.

  ── Hub discovery ────────────────────────────────────────────────────────────

  The template groups the clusters list by hub name.  Every distinct hub value
  in clusters.yaml produces one Application, named hub-clusters-<hubName>.

  ── valueFiles derivation ────────────────────────────────────────────────────

  For each hub the template builds the correct valueFiles list automatically:
    1. clusters.yaml — always first (provides .Values.clusters to hub-clusters)
    2. groups/<name>/values.yaml — for every unique group referenced by any
       cluster on this hub, in first-occurrence order across the cluster list.
       The order of entries in each cluster's groups: list determines merge
       priority in hub-clusters (first = lowest, last = highest).
    3. clusters/<name>/values.yaml — for every cluster on this hub

  This means adding a cluster to clusters.yaml automatically updates the hub
  Application's valueFiles without any manual edit.  The GitHub Action renders
  this chart and commits hub/rendered/hub-applications.yaml whenever
  clusters.yaml, groups/*, or clusters/* change.

  ── Group format ──────────────────────────────────────────────────────────────

  Groups in the clusters.yaml groups: list may be plain strings or objects:
    groups: [all, edge-sno]                              # plain string
    groups: [all, { name: edge-sno, targetRevision: rc }]  # object with pin

  Only the group name is used for valueFiles path derivation; the targetRevision
  field is consumed by hub-clusters at runtime and ignored here.

*/ -}}

{{- /* ── Step 1: Group clusters by hub ──────────────────────────────────────── */ -}}
{{- $hubs := dict -}}
{{- range .Values.clusters -}}
  {{- $hubName := .hub -}}
  {{- if not (hasKey $hubs $hubName) -}}
    {{- $_ := set $hubs $hubName list -}}
  {{- end -}}
  {{- $_ := set $hubs $hubName (append (index $hubs $hubName) .) -}}
{{- end -}}

{{- /* ── Step 2: Generate one Application per hub ──────────────────────────── */ -}}
{{- range $hubName, $hubClusters := $hubs -}}

{{- /*
  Build the deduplicated, ordered group list for this hub.
  Walk each cluster's groups: list in declaration order; extract the group name
  from string or object entries; add each name once (first occurrence wins for
  deduplication, preserving the natural order).
*/ -}}
{{- $hubGroups := list -}}
{{- range $hubClusters -}}
  {{- range .groups -}}
    {{- $groupName := . -}}
    {{- if kindIs "map" . -}}
      {{- $groupName = .name -}}
    {{- end -}}
    {{- if not (has $groupName $hubGroups) -}}
      {{- $hubGroups = append $hubGroups $groupName -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- $prefix := $.Values.source.valueFilesPrefix -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-clusters-{{ $hubName }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    managed-by: hub-bootstrap
    hub: {{ $hubName }}
  annotations:
    # Human-readable cluster and group lists — not consumed by Argo CD.
    hub-bootstrap/clusters: "{{ range $i, $c := $hubClusters }}{{ if $i }}, {{ end }}{{ $c.name }}{{ end }}"
    hub-bootstrap/groups: "{{ join ", " $hubGroups }}"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}

  source:
    repoURL: {{ $.Values.source.repoURL }}
    targetRevision: {{ $.Values.source.targetRevision }}
    path: {{ $.Values.source.hubClustersChartPath }}

    helm:
      parameters:
        - name: currentHub
          value: {{ $hubName }}

      # valueFiles are relative to the chart source path (charts/hub-clusters/).
      # All entries are derived from clusters.yaml — no manual list maintenance.
      ignoreMissingValueFiles: true
      valueFiles:
        # 1. Cluster inventory — must be first; provides .Values.clusters to hub-clusters
        - {{ $prefix }}/clusters.yaml
        # 2. Group values files — one per unique group across all hub clusters
        {{- range $hubGroups }}
        - {{ $prefix }}/groups/{{ . }}/values.yaml
        {{- end }}
        # 3. Cluster-specific overrides — one per cluster on this hub
        {{- range $hubClusters }}
        - {{ $prefix }}/clusters/{{ .name }}/values.yaml
        {{- end }}

  destination:
    server: {{ $.Values.destination.server }}
    namespace: {{ $.Values.argocd.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
{{ end -}}
