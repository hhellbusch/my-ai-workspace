apiVersion: v2
name: hub-clusters
description: |
  Hub-scoped cluster dispatch chart.  Reads clusters.yaml (the central cluster
  inventory), filters to clusters belonging to the current hub, and generates one
  Argo CD Application per enabled component per cluster — all in a single render.

  This chart runs as a child of hub-bootstrap (one Application per hub).  The
  full three-level cascade is:
    bootstrap-root → hub-bootstrap (per hub) → hub-clusters (per cluster)

  Key behaviours:
    - currentHub parameter determines which clusters are in scope for this
      Argo CD instance.  One hub Application per environment (dev, prod-a, prod-b).
    - Group components (component-<groupName>) are merged in the declaration order
      from hubConfig.<hubName>.groupOrder in clusters.yaml using mustMergeOverwrite.
    - Cluster component (component-<clusterName>) is merged last as the highest-
      priority override layer.
    - Cluster metadata from clusters.yaml (name, server, environment, region,
      vault, monitoring, etc.) is injected into every generated Application's
      spec.source.helm.values under the cluster: key.  Component charts receive
      a fully-populated cluster: block without repeating this data per component.

  Values loaded by the hub Application (lowest → highest priority):
    charts/hub-clusters/values.yaml  (chart defaults)
    clusters.yaml                    (cluster inventory — provides .Values.clusters)
    groups/all/values.yaml           (component-all)
    groups/<group>/values.yaml       (component-<group>, one per group)
    clusters/<name>/values.yaml      (component-<clusterName>, one per cluster)

version: 0.1.0
type: application
