{{- /*
  hub-clusters / application.yaml
  ════════════════════════════════

  Generates one Argo CD Application per enabled component for every cluster
  that belongs to the current hub.

  ── Multi-hub filtering ───────────────────────────────────────────────────────

  .Values.currentHub is set by the hub Application's helm.parameters.
  Only clusters where cluster.hub == currentHub are rendered.  One instance
  of this chart runs on each hub cluster, scoped to its own environment.

  ── Resolution pipeline ───────────────────────────────────────────────────────

  For each hub-matched cluster:

  Step 1  Read groups: from clusters.yaml for this cluster.
          Merge component-<groupName> keys in declaration order using
          mustMergeOverwrite.  Groups listed later override groups listed
          earlier — the all group is always listed first (lowest priority).

  Step 2  Merge component-<clusterName> last.
          The cluster-specific component (from clusters/<name>/values.yaml)
          is always the highest-priority override layer.

  Step 3  Inject cluster metadata from clusters.yaml.
          Build the cluster: block from the clusters.yaml entry — name, server,
          environment, region, and any shared attributes (vault, monitoring, etc.).
          This overwrites any cluster: key that may exist in the component values,
          making clusters.yaml the single authoritative source for cluster identity.
          Internal fields (groups:, targetRevision:) are stripped before injection.

  targetRevision resolution (three levels, last wins):
          1. $.Values.source.targetRevision — the hub Application's own revision
             (typically "main"); the fleet-wide default.
          2. Group-level targetRevision — groups are walked in declaration order;
             a group entry that is an object with a targetRevision field overrides
             the hub default.  Later groups in the list win over earlier ones.
             Plain string entries ("all") carry no targetRevision.
          3. Cluster-level targetRevision — if the clusters.yaml entry for this
             cluster has a targetRevision field it wins over everything above.
          Use this three-level chain for canary promotion, emergency rollback,
          or controlled version testing without touching every cluster entry:
            - Pin one group (e.g. edge-sno) to a release candidate
            - Override a single cluster further while the rest of the group stays put
          Group format supports both strings and objects:
            groups: [all, edge-sno]                              # plain strings
            groups: [all, { name: edge-sno, targetRevision: rc }]  # with override

  path — optional explicit component path:
          Each app entry may set path: components/nmstate/operator to override the
          default path resolution (componentsBasePath/appName).  Use this when an
          operator and its instance configuration live together under one component
          folder: components/<name>/operator and components/<name>/instance.

  syncWave — optional ArgoCD sync wave (string "0", "5", "10" etc.):
          Set argocd.argoproj.io/sync-wave on the generated Application.  Use to
          order installation: operator installs in wave 0, instance CRs in wave 5
          (after the operator's CRDs are registered).  Not set if omitted.

  sourceType — Kustomize or Helm per component:
          Each app entry may set sourceType: helm (default) or sourceType: kustomize.
          Helm components receive the full mustMergeOverwrite value chain injected
          into spec.source.helm.values (current behaviour).
          Kustomize components receive a spec.source.kustomize block with:
            commonLabels:   cluster identity fields (name, environment, region, hub)
            commonAnnotations: flat string representations of nested attributes
          Note: Kustomize commonLabels/Annotations carry only flat string values.
          Nested cluster attributes (vault, monitoring) are serialised as JSON strings
          in commonAnnotations.  For richer per-cluster configuration in Kustomize
          components, use ArgoCD multi-source (ArgoCD 2.6+) to supply a separate
          cluster-specific patch source alongside the Kustomize component path.

  Step 4  Generate Applications.
          For each app where enabled ≠ false, emit an Application whose
          spec.source.helm.values contains:
            cluster:     the fully-populated cluster block (from clusters.yaml)
            <app-keys>:  merged component values (from groups + cluster override)

  The component chart receives .Values.cluster.<field> for environment-aware
  behaviour (e.g. choosing a Vault path, selecting a monitoring endpoint) without
  any per-component duplication of cluster metadata.

  ── enabled: false semantics ─────────────────────────────────────────────────

  toString comparison (ne ... "false") correctly handles the Helm `default`
  function quirk where `default true false` returns true.

*/ -}}

{{- $currentHub := .Values.currentHub | required "currentHub is required — set via helm.parameters in the hub Application" -}}

{{- range .Values.clusters -}}
{{- if eq .hub $currentHub -}}

{{- /* ── Capture the full clusters.yaml entry for this cluster ─────────────── */ -}}
{{- $clusterEntry := . -}}
{{- $clusterName  := .name -}}
{{- $groups       := .groups | default list -}}

{{- /* ── Resolve targetRevision: hub default → groups in order → cluster ────── */ -}}
{{- /* Resolution priority (last wins):                                          */ -}}
{{- /*   1. $.Values.source.targetRevision  — hub Application default            */ -}}
{{- /*   2. group.targetRevision            — group object entries, in order      */ -}}
{{- /*   3. clusters.yaml entry.targetRevision — cluster-level pin (highest)      */ -}}
{{- /*                                                                            */ -}}
{{- /* Group entries may be plain strings ("all") or objects                      */ -}}
{{- /* ({ name: virt-enabled, targetRevision: release/v2.0 }).                   */ -}}
{{- /* Plain strings carry no targetRevision and are equivalent to the old format.*/ -}}
{{- /* A dict is used to carry mutable state across the range scope.             */ -}}
{{- $revState := dict "rev" $.Values.source.targetRevision -}}
{{- range $groups -}}
  {{- if kindIs "map" . -}}
    {{- if .targetRevision -}}
      {{- $_ := set $revState "rev" .targetRevision -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if $clusterEntry.targetRevision -}}
  {{- $_ := set $revState "rev" $clusterEntry.targetRevision -}}
{{- end -}}
{{- $targetRevision := $revState.rev -}}

{{- /* ── Step 1: Merge group components in declaration order ────────────────── */ -}}
{{- /* Groups may be plain strings or objects; extract the name accordingly.     */ -}}
{{- $resolved := dict -}}
{{- range $groups -}}
  {{- $groupName := . -}}
  {{- if kindIs "map" . -}}
    {{- $groupName = .name -}}
  {{- end -}}
  {{- $key      := printf "component-%s" $groupName -}}
  {{- $groupVal := index $.Values $key | default dict -}}
  {{- if kindIs "map" $groupVal -}}
    {{- $resolved = mustMergeOverwrite $resolved (deepCopy $groupVal) -}}
  {{- end -}}
{{- end -}}

{{- /* ── Step 2: Merge cluster-specific component overrides ─────────────────── */ -}}
{{- $clusterKey := printf "component-%s" $clusterName -}}
{{- $clusterVal := index $.Values $clusterKey | default dict -}}
{{- if kindIs "map" $clusterVal -}}
  {{- $resolved = mustMergeOverwrite $resolved (deepCopy $clusterVal) -}}
{{- end -}}

{{- /* ── Step 3: Build and inject the cluster metadata block ─────────────────── */ -}}
{{- /* Strip groups: and targetRevision from the inventory entry — internal fields */ -}}
{{- $clusterMeta := omit $clusterEntry "groups" "targetRevision" -}}
{{- /* Overwrite any cluster: key in resolved — clusters.yaml is authoritative  */ -}}
{{- $_ := set $resolved "cluster" $clusterMeta -}}

{{- $apps          := $resolved.apps   | default dict -}}
{{- $clusterBlock  := $resolved.cluster | default dict -}}
{{- $clusterServer := $clusterBlock.server | default $.Values.destination.server -}}

{{- /* ── Step 4: Generate one Application per enabled app ─────────────────────── */ -}}
{{- range $appName, $appVals := $apps -}}
{{- $enabled := ne (toString (get $appVals "enabled")) "false" -}}
{{- if and $appVals $enabled -}}
{{- $sourceType := get $appVals "sourceType" | default "helm" -}}
{{- /* path — explicit override or derive from componentsBasePath/appName.
       Use this to support sub-paths such as components/nmstate/operator or
       components/nmstate/instance, allowing operator and instance configs to
       live together under one component folder. */ -}}
{{- $appPath := get $appVals "path" | default (printf "%s/%s" $.Values.source.componentsBasePath $appName) -}}
{{- /* syncWave — optional ArgoCD sync wave annotation (string, e.g. "0", "5", "10").
       Use to order operator installation before instance configuration:
         operator app  → syncWave: "0"
         instance app  → syncWave: "5" */ -}}
{{- $syncWave := get $appVals "syncWave" | default "" -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $clusterName }}-{{ $appName }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    managed-by: hub-clusters
    hub: {{ $currentHub }}
    cluster: {{ $clusterName }}
    app: {{ $appName }}
    env: {{ $clusterBlock.environment | default "unknown" }}
    source-type: {{ $sourceType }}
  annotations:
    {{- if $syncWave }}
    argocd.argoproj.io/sync-wave: {{ $syncWave | quote }}
    {{- end }}
    hub-clusters/component-path: {{ $appPath | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}

  source:
    repoURL: {{ $.Values.source.repoURL }}
    targetRevision: {{ $targetRevision }}
    path: {{ $appPath }}
    {{- if eq $sourceType "kustomize" }}
    kustomize:
      # Cluster identity injected as commonLabels — available to all Kustomize resources
      # as labels without any template logic in the component itself.
      commonLabels:
        cluster-name: {{ $clusterMeta.name | quote }}
        cluster-environment: {{ $clusterMeta.environment | default "unknown" | quote }}
        cluster-region: {{ $clusterMeta.region | default "" | quote }}
        cluster-hub: {{ $currentHub | quote }}
      # Nested cluster attributes (vault, monitoring, etc.) serialised as JSON strings.
      # These cover fields not already expressed as commonLabels above.
      # Components that need these values should use ArgoCD multi-source (ArgoCD 2.6+)
      # to supply a separate cluster-specific patch source alongside this Kustomize path.
      {{- $labelKeys := list "name" "environment" "region" "server" "hub" -}}
      {{- $extraAttrs := dict -}}
      {{- range $k, $v := $clusterMeta -}}
      {{- if not (has $k $labelKeys) -}}
      {{- $_ := set $extraAttrs $k $v -}}
      {{- end -}}
      {{- end -}}
      {{- if $extraAttrs }}
      commonAnnotations:
        {{- range $k, $v := $extraAttrs }}
        cluster-{{ $k }}: {{ $v | toJson | quote }}
        {{- end }}
      {{- end }}
    {{- else }}
    helm:
      # Fully resolved values — Argo CD receives a single flat block.
      #
      # cluster: is populated from clusters.yaml (not from component values files).
      # Component charts use .Values.cluster.environment, .Values.cluster.vault,
      # etc. for environment-specific behaviour without any per-component repetition.
      values: |
        cluster:
          {{- $clusterMeta | toYaml | nindent 10 }}
        {{- omit $appVals "enabled" "sourceType" "path" "syncWave" | toYaml | nindent 8 }}
    {{- end }}

  destination:
    server: {{ $clusterServer }}
    namespace: {{ get $appVals "namespace" | default $appName }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
{{- end -}}
{{- end -}}

{{- end -}}
{{- end -}}
