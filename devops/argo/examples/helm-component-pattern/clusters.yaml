# clusters.yaml — central cluster inventory
#
# Single authoritative source for:
#   - Which clusters exist
#   - Which hub manages each cluster (hub: field — must match the currentHub
#     parameter on each hub's hub-clusters Application)
#   - Which groups the cluster belongs to (drives mustMergeOverwrite order)
#   - Shared cluster attributes pushed into every component's cluster: block
#
# Component-level overrides (e.g. installPlanApproval: Manual for cert-manager)
# belong in clusters/<name>/values.yaml as component-<clusterName>.apps overrides.
# This file owns identity and topology; the cluster values files own deviations.
#
# targetRevision — three-level resolution (last wins):
#
#   1. Hub Application targetRevision (typically "main") — fleet default.
#
#   2. Group-level targetRevision — set on a group entry as an object:
#        groups:
#          - all
#          - name: edge-sno
#            targetRevision: release/v2.0    # all edge-sno clusters track this
#      Plain string entries carry no targetRevision (backward compatible).
#      Groups are walked in declaration order; later groups win.
#
#   3. Cluster-level targetRevision — field on this cluster entry.
#      Overrides group-level and hub default.
#      Use to pin one specific cluster independent of its groups.
#
# Common patterns:
#   Canary:   one cluster → targetRevision: feature/cert-manager-upgrade
#   Ring:     group object edge-sno → targetRevision: release/v1.3
#             then site-edge-1 → targetRevision: release/v1.3-rc1 (further ahead)
#   Rollback: add targetRevision: release/v1.2 to a cluster to hold it back
#
# clusters: is loaded by the hub-clusters chart via helm valueFiles.
# It is NOT loaded by the cluster-apps chart (the render-script approach).
#
# hubConfig: controls hub-level settings, including the canonical group load order.
# groupOrder: defines the priority of groups for mustMergeOverwrite — earlier in the
# list = lower priority, later = higher priority.  The cluster's component-<name>
# always wins (injected last), regardless of this order.
# If a cluster belongs to a group not listed here, it is a configuration error.

hubConfig:
  prod-a:
    groupOrder: [all, virt-enabled, edge-sno]
  prod-b:
    groupOrder: [all, virt-enabled]
  dev:
    groupOrder: [all]

clusters:

  # ── prod-a hub ─────────────────────────────────────────────────────────────

  - name: site-dc1
    hub: prod-a
    environment: production
    region: us-east
    server: https://api.site-dc1.example.com:6443
    groups:
      - all
      - virt-enabled
    # Shared attributes — pushed into every component Application's cluster: block.
    # Component charts use .Values.cluster.vault, .Values.cluster.monitoring, etc.
    vault:
      server: https://vault.prod-a.example.com
      clusterSecretStoreName: vault-backend
    monitoring:
      remoteWriteEndpoint: https://mimir.prod-a.example.com/api/v1/push

  - name: site-edge-1
    hub: prod-a
    environment: production
    region: edge-us-east
    server: https://api.site-edge-1.example.com:6443
    groups:
      - all
      # Group object format — pins all edge-sno clusters to a release candidate
      # while the rest of the fleet stays on main.  Other edge clusters that
      # belong to edge-sno will also pick up this targetRevision automatically.
      # Remove the object form (revert to "- edge-sno") once the release is stable.
      - name: edge-sno
        targetRevision: release/v2.0-rc1
    vault:
      server: https://vault.prod-a.example.com
      clusterSecretStoreName: vault-backend
    monitoring:
      remoteWriteEndpoint: https://mimir.prod-a.example.com/api/v1/push

  # ── prod-b hub ─────────────────────────────────────────────────────────────

  - name: site-dc2
    hub: prod-b
    environment: production
    region: us-west
    server: https://api.site-dc2.example.com:6443
    groups:
      - all
      - virt-enabled
    vault:
      server: https://vault.prod-b.example.com
      clusterSecretStoreName: vault-backend
    monitoring:
      remoteWriteEndpoint: https://mimir.prod-b.example.com/api/v1/push

  # ── dev hub ────────────────────────────────────────────────────────────────

  - name: site-dev-1
    hub: dev
    environment: development
    region: us-east
    server: https://api.site-dev-1.example.com:6443
    groups:
      - all
    # Cluster-level override — uncomment to pin this cluster to a specific ref
    # while the hub default (main) remains in effect for all other clusters.
    # This takes priority over any group-level targetRevision.
    # targetRevision: feature/new-component
    vault:
      server: https://vault.dev.example.com
      clusterSecretStoreName: vault-backend
    monitoring:
      remoteWriteEndpoint: https://mimir.dev.example.com/api/v1/push
