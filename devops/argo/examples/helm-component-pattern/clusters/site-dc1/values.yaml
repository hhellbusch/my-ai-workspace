# Cluster: site-dc1
# Component overrides only.
#
# Cluster metadata (hub, server, environment, region, groups, vault, monitoring)
# lives in clusters.yaml — the global-root chart injects it into every
# Application's cluster: block automatically.
#
# This file only needs to exist when site-dc1 deviates from group defaults.
# If there are no overrides, the file can be empty or omitted.
#
# Key convention: component-site-dc1 (component-<clusterName>)

component-site-dc1:
  apps:
    cert-manager:
      # Production cluster: require human approval before operator upgrades apply.
      installPlanApproval: Manual
