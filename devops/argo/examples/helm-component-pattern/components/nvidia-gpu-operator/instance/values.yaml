# nvidia-gpu-operator/instance — default values
#
# These set the base defaults for the ClusterPolicy. Groups and clusters
# override specific fields. GPU mode (time-slicing, MIG, vGPU) is opt-in
# and requires explicit group/cluster configuration.
#
# MIG support in OpenShift requires OCP 4.20+ — clusters on 4.18 and earlier
# cannot use MIG strategy and will fail validation if mig.strategy is set.
# See docs/gpu-mig-opc-version.md for version compatibility details.

clusterPolicy:
  namespace: nvidia-gpu-operator

  driver:
    enabled: true
    useOpenKernelModules: true
    # Precompiled driver — recommended for OCP (no entitlement needed)
    usePrecompiled: true
    # Version is overridden per-cluster via operators-installer
    version: "550.90.07"
    rdma:
      enabled: false
    upgradePolicy:
      autoUpgrade: true
      maxParallelUpgrades: 1
      maxUnavailable: "25%"
      waitForCompletion:
        timeoutSeconds: 0

  toolkit:
    enabled: true

  devicePlugin:
    enabled: true

  dcgmExporter:
    enabled: true
    serviceMonitor:
      enabled: true

  gfd:
    enabled: true

  nodeStatusExporter:
    enabled: true

  sandboxWorkloads:
    enabled: false

  # ── vGPU configuration (opt-in) ─────────────────────────────────────────────
  # vGPU requires:
  #   1. IOMMU enabled on host via MachineConfig (triggers node reboot)
  #   2. Node labeled: nvidia.com/gpu.workload.config=vm-vgpu
  #   3. vgpuManager image pulled from NVIDIA NGC (requires NGC credentials)
  #   4. NLS license server accessible from the cluster
  #
  # Enable at the cluster layer with explicit profile and node assignments.
  # Do NOT enable at the group layer — vGPU requires per-cluster planning.
  vgpu:
    enabled: false

    vgpuManager:
      enabled: false
      # NGC image — set repository and version at cluster layer
      # registry: nvcr.io/nvidia
      # image: vgpu-manager
      # version: "570.133.10"  # must match vGPU driver version from NVIDIA portal
      repository: ""
      version: ""

    vgpuDeviceManager:
      enabled: false

    # Profile ConfigMap — read by vGPU Device Manager
    configMap:
      name: vgpu-device-config
      default: "default"

    # profiles: map of config-key → vGPU type and count per GPU
    # Set at the cluster layer for the specific GPU model installed.
    # Example for A40:
    #   a40-8q:
    #     type: A40-8Q    # 8 GB framebuffer, 6 VMs per A40
    #     count: 6
    #   a40-6q:
    #     type: A40-6Q    # 6 GB framebuffer, 8 VMs per A40
    #     count: 8
    profiles: {}

    # Node → profile assignments. Informational ConfigMap applied externally.
    nodeProfiles:
      configMapName: vgpu-node-profiles
      # assignments: map of node-name → config-key
      # Example:
      #   gpu-node-1: a40-8q
      #   gpu-node-2: a40-8q
      #   gpu-node-3: a40-6q
      assignments: {}

    # NLS licensing — credentials pulled from Vault via ESO.
    # Set vaultPath at the cluster layer. Vault path convention:
    #   secret/fleet/nls/<cluster-name>
    # Expected Vault keys: server, token
    # See templates/vgpu-license.yaml for the ExternalSecret definition.
    licensing:
      vaultPath: ""
      secretStoreName: vault-backend

    # NFD NodeFeatureRule — auto-label nodes based on PCI hardware detection.
    # Applies nvidia.com/vgpu.config = defaultProfile to all nodes with
    # matching GPU hardware. Disabled by default — enable at group or cluster
    # layer and define gpuProfiles for your hardware.
    # See templates/vgpu-nfd-rule.yaml and devops/ocp/gpu/vgpu-node-labeling.md.
    nfdRule:
      enabled: false
      # gpuProfiles: list of GPU models with PCI device IDs and default profiles
      # Example:
      #   - name: nvidia-a40-default
      #     pciDeviceIds: ["2235"]   # A40
      #     defaultProfile: a40-8q
      gpuProfiles: []

    # VFIO Manager — enable for GPU passthrough VMs (mutually exclusive with vGPU)
    vfioManager:
      enabled: false

    # Sandbox Device Plugin — required for both vGPU and passthrough VM workloads
    sandboxDevicePlugin:
      enabled: true

    # Pre-sync drain check — blocks ArgoCD sync if any VMI has a GPU device attached.
    # Protects against vGPU profile changes landing while VMs are running.
    # Active on every sync when vgpu.enabled is true. Set enabled: false to bypass
    # for syncs that do not touch the profile ConfigMap (e.g., driver version bumps).
    drainCheck:
      enabled: true
      # image must have oc and basic shell utilities (bash, grep)
      image: quay.io/openshift/origin-cli:latest
