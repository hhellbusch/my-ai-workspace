# Group: all
# Applied to every cluster in the fleet — fleet-wide baseline.
#
# Key convention: component-all (component-<groupName>)
#
# This file ENABLES components and provides their value overrides.
# path, syncWave, and description are defined in componentRegistry (values.yaml) —
# do NOT duplicate them here.  Only override them here if a specific group needs
# a non-standard path or wave.
#
# Operator + instance split:
#   For operators that need separate OLM installation and CR configuration,
#   two app entries are defined (e.g. nmstate-operator + nmstate-instance).
#   Ordering is handled by syncWave in the registry, not in this file.
#
# Loaded first by hub-clusters — lowest priority in the merge chain.

component-all:
  apps:
    # ── NMState: operator + instance split ─────────────────────────────────────
    nmstate-operator:
      enabled: true
      # operators-installer subchart configuration.
      # Note: overriding operators-installer.operators replaces the entire list
      # (list merge limitation — see docs/operator-management.md).
      operators-installer:
        operators:
          - name: kubernetes-nmstate-operator
            source: redhat-operators
            sourceNamespace: openshift-marketplace
            namespace: openshift-nmstate
            channel: stable
            installPlanApproval: Automatic
            csv: ""     # set to pin version, e.g. "kubernetes-nmstate-operator.4.16.2"
        operatorGroups:
          - name: openshift-nmstate
            createNamespace: true
            targetOwnNamespace: true

    nmstate-instance:
      enabled: true
      namespace: openshift-nmstate

    # ── cert-manager: flat pattern ──────────────────────────────────────────────
    # Single Application manages the full operator lifecycle.
    cert-manager:
      enabled: true
      channel: stable-v1
      namespace: cert-manager
      installPlanApproval: Automatic
      resources:
        requests:
          memory: 128Mi
          cpu: 50m

    # ── OpenShift Virtualization: disabled by default ───────────────────────────
    kubevirt-hyperconverged:
      enabled: false

    # ── GPU stack: disabled by default ─────────────────────────────────────────
    # All four components are opt-in. Enable via the gpu-enabled group or per
    # cluster. See groups/gpu-enabled/values.yaml for the full configuration.
    nfd-operator:
      enabled: false

    nfd-instance:
      enabled: false

    nvidia-gpu-operator:
      enabled: false

    nvidia-gpu-operator-instance:
      enabled: false
      operators-installer:
        operators:
          - name: kubevirt-hyperconverged
            source: redhat-operators
            sourceNamespace: openshift-marketplace
            namespace: openshift-cnv
            channel: stable
            installPlanApproval: Automatic
            csv: ""
        operatorGroups:
          - name: openshift-cnv
            createNamespace: true
            targetOwnNamespace: true
