---
# prod-a-hub-clusters.yaml  (formerly prod-a-global-root.yaml)
#
# Legacy hand-authored hub Application for the prod-a hub.
# Superseded by hub-bootstrap chart + GitHub Action (see hub/bootstrap-root.yaml).
# Kept as a reference for environments that cannot use the hub-bootstrap chart.
#
# Apply with:
#   oc apply -f hub/legacy/prod-a-hub-clusters.yaml -n openshift-gitops
#
# This Application runs the hub-clusters Helm chart on Argo CD.  The chart
# reads all loaded values files, filters clusters by currentHub=prod-a, and
# generates one Argo CD Application per enabled component per cluster.
#
# No render script is needed — Argo CD calls helm template at sync time.
# The generated Applications are live objects in openshift-gitops, not files.
#
# Onboarding a new cluster on prod-a:
#   1. Add the cluster to clusters.yaml with hub: prod-a
#   2. Optionally add clusters/<name>/values.yaml for overrides
#   3. Add the cluster's valueFiles entry to this Application (see valueFiles below)
#   4. Merge PR — Argo CD re-renders the hub-clusters chart and creates the
#      new cluster's component Applications automatically
#
# Adding a new group:
#   1. Create groups/<group-name>/values.yaml with component-<group-name>: { ... }
#   2. Add its valueFiles entry to all hub Applications that have clusters using it
#   3. Add the group to the relevant clusters in clusters.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-clusters-prod-a
  namespace: openshift-gitops
  labels:
    managed-by: helm-component-pattern
    hub: prod-a
  annotations:
    # List the hub's clusters here for human readability — not used by the chart.
    helm-component-pattern/clusters: "site-dc1, site-edge-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
    targetRevision: main
    path: devops/argo/examples/helm-component-pattern/charts/hub-clusters

    helm:
      parameters:
        # currentHub tells the chart which clusters to render.
        # Must match the hub: field in clusters.yaml.
        - name: currentHub
          value: prod-a

      # valueFiles are relative to the chart source path in the repo.
      # Load order = lowest to highest priority:
      #   clusters.yaml         → .Values.clusters (inventory)
      #   groups/all            → component-all
      #   groups/virt-enabled   → component-virt-enabled (prod-a has virt clusters)
      #   groups/edge-sno       → component-edge-sno (prod-a has edge clusters)
      #   clusters/site-dc1     → component-site-dc1 (cluster overrides, if any)
      #   clusters/site-edge-1  → component-site-edge-1
      #
      # Add a new valueFiles entry when:
      #   - A new group is created and any prod-a cluster uses it
      #   - A new cluster is added to prod-a
      ignoreMissingValueFiles: true
      valueFiles:
        # Inventory (must be first — provides .Values.clusters)
        - ../../clusters.yaml
        # Groups (in priority order — more specific groups after more general ones)
        - ../../groups/all/values.yaml
        - ../../groups/virt-enabled/values.yaml
        - ../../groups/edge-sno/values.yaml
        # Cluster-specific overrides (one entry per cluster on this hub)
        - ../../clusters/site-dc1/values.yaml
        - ../../clusters/site-edge-1/values.yaml

  destination:
    # The hub-clusters Application itself deploys to the hub — it creates
    # Application objects in openshift-gitops, which then target spoke clusters.
    server: https://kubernetes.default.svc
    namespace: openshift-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
