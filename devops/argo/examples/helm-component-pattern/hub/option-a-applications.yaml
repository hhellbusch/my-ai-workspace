---
# option-a-applications.yaml
#
# Option A — Applications-only bootstrap (no ApplicationSet controller required)
#
# One Argo CD Application per cluster.  Each Application points at a cluster's
# pre-rendered directory.  No ApplicationSet, no dynamic discovery — clusters
# are registered by adding an Application block to this file.
#
# See also: option-b-applicationset.yaml — the ApplicationSet approach that
# auto-discovers clusters and requires Argo CD 2.x with the ApplicationSet
# controller.
#
# When to use this file:
#   - Argo CD version < 2.0, or ApplicationSet controller not installed
#   - Environments where ApplicationSet is disabled by policy
#   - Preference for explicit, auditable registration of every cluster
#     (no implicit discovery — a cluster does not exist in Argo CD until
#     someone explicitly adds it here)
#
# Apply with:
#   oc apply -f hub/option-a-applications.yaml -n openshift-gitops
#
# Onboarding a new cluster:
#   1. Create clusters/<name>/values.yaml
#   2. Run: ./scripts/render-clusters.sh <name>
#   3. Commit clusters/<name>/rendered/applications.yaml
#   4. Add a new Application block to THIS file (copy the template below)
#   5. Merge PR — apply the updated file to create the new Application
#
# Updating an existing cluster:
#   1. Edit a group or cluster values file
#   2. Run: ./scripts/render-clusters.sh <name>
#   3. Review diff in clusters/<name>/rendered/applications.yaml
#   4. Merge PR — Argo CD detects the change in the rendered directory and syncs

# ── Template — copy this block for each new cluster ────────────────────────
#
#   ---
#   apiVersion: argoproj.io/v1alpha1
#   kind: Application
#   metadata:
#     name: <cluster-name>-rendered
#     namespace: openshift-gitops
#     labels:
#       managed-by: helm-component-pattern
#     finalizers:
#       - resources-finalizer.argocd.argoproj.io
#   spec:
#     project: default
#     source:
#       repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
#       targetRevision: main
#       path: devops/argo/examples/helm-component-pattern/clusters/<cluster-name>/rendered
#     destination:
#       server: https://kubernetes.default.svc
#       namespace: openshift-gitops
#     syncPolicy:
#       automated:
#         prune: true
#         selfHeal: true
#       syncOptions:
#         - CreateNamespace=false
#         - ServerSideApply=true

# ── Registered clusters ─────────────────────────────────────────────────────

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: site-dc1-rendered
  namespace: openshift-gitops
  labels:
    managed-by: helm-component-pattern
    cluster: site-dc1
  annotations:
    # List the groups so reviewers know which component-* keys are active
    # without opening the cluster values file.
    helm-component-pattern/groups: "all, virt-enabled"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
    targetRevision: main
    path: devops/argo/examples/helm-component-pattern/clusters/site-dc1/rendered
  destination:
    # Applications in the rendered directory target spoke clusters, so the
    # destination here is the hub — Argo CD applies the Application objects
    # to openshift-gitops on the hub, which then manages the spoke.
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: site-edge-1-rendered
  namespace: openshift-gitops
  labels:
    managed-by: helm-component-pattern
    cluster: site-edge-1
  annotations:
    helm-component-pattern/groups: "all, edge-sno"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
    targetRevision: main
    path: devops/argo/examples/helm-component-pattern/clusters/site-edge-1/rendered
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
