---
# option-b-applicationset.yaml
#
# Option B — ApplicationSet bootstrap (Argo CD 2.x with ApplicationSet controller)
#
# A single ApplicationSet discovers every clusters/*/rendered/ directory and
# generates one child Application per cluster automatically.  New clusters are
# onboarded by adding their directory and re-running the render script — no
# manual Application YAML required.
#
# See also: option-a-applications.yaml — the Applications-only approach for
# older Argo CD versions or environments without the ApplicationSet controller.
#
# Apply with:
#   oc apply -f hub/option-b-applicationset.yaml -n openshift-gitops
#
# Argo CD version requirement: 2.0+ with ApplicationSet controller installed.
# On OpenShift GitOps the controller ships with the operator by default.
#
# Onboarding a new cluster:
#   1. Create clusters/<name>/values.yaml
#   2. Run: ./scripts/render-clusters.sh <name>
#   3. Commit clusters/<name>/rendered/applications.yaml
#   4. Merge PR → ApplicationSet auto-discovers the new directory and creates
#      the child Application without any change to this file.
#
# Workflow:
#   1. Edit a group or cluster values file.
#   2. Run: ./scripts/render-clusters.sh [cluster-name]
#   3. Review the diff in clusters/<name>/rendered/applications.yaml.
#   4. Open a PR — CI can validate the rendered YAML with kubeval or conftest.
#   5. Merge → ApplicationSet picks up the rendered Application objects.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-rendered-apps
  namespace: openshift-gitops
  labels:
    managed-by: helm-component-pattern
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true

  generators:
    - git:
        repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
        revision: main
        directories:
          - path: devops/argo/examples/helm-component-pattern/clusters/*/rendered

  template:
    metadata:
      # Name derived from the directory path: clusters/<cluster>/rendered → <cluster>-rendered
      name: "{{path.basename}}-rendered"
      namespace: openshift-gitops
      labels:
        managed-by: helm-component-pattern
      annotations:
        argocd.argoproj.io/manifest-generate-paths: "{{path}}"

    spec:
      project: default

      source:
        repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
        targetRevision: main
        path: "{{path}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
