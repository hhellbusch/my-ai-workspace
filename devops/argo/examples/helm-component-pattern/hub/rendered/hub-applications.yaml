---
# Source: hub-bootstrap/templates/hub-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-clusters-dev
  namespace: openshift-gitops
  labels:
    managed-by: hub-bootstrap
    hub: dev
  annotations:
    # Human-readable cluster list — not consumed by Argo CD.
    hub-bootstrap/clusters: "site-dev-1"
    hub-bootstrap/groups: "all"
    hub-bootstrap/group-order-source: "implicit-WARNING-add-hubConfig-groupOrder-to-clusters.yaml"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR-ORG/YOUR-REPO.git
    targetRevision: main
    path: devops/argo/examples/helm-component-pattern/charts/hub-clusters

    helm:
      parameters:
        - name: currentHub
          value: dev

      # valueFiles are relative to the chart source path (charts/hub-clusters/).
      # All entries are derived from clusters.yaml — no manual list maintenance.
      ignoreMissingValueFiles: true
      valueFiles:
        # 1. Cluster inventory — must be first; provides .Values.clusters to hub-clusters
        - ../../clusters.yaml
        # 2. Group values files — one per unique group across all hub clusters
        - ../../groups/all/values.yaml
        # 3. Cluster-specific overrides — one per cluster on this hub
        - ../../clusters/site-dev-1/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m---
