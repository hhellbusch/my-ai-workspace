# SNO local storage — Local Storage Operator + LocalVolume for vdb (50G virtio disk)
# Cluster: sno.hell | Node: sno | Device: virtio-pci-0000:07:00.0
# See local-storage.md for full procedure and troubleshooting.
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-local-storage
  labels:
    openshift.io/cluster-monitoring: "true"
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-local-storage
  namespace: openshift-local-storage
spec:
  targetNamespaces:
  - openshift-local-storage
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: local-storage-operator
  namespace: openshift-local-storage
spec:
  channel: stable
  name: local-storage-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
apiVersion: local.storage.openshift.io/v1
kind: LocalVolume
metadata:
  name: sno-local
  namespace: openshift-local-storage
spec:
  nodeSelector:
    nodeSelectorTerms:
    - matchExpressions:
      - key: kubernetes.io/hostname
        operator: In
        values:
        - sno
  storageClassDevices:
  - devicePaths:
    - /dev/disk/by-path/virtio-pci-0000:07:00.0
    fsType: ext4
    storageClassName: local-storage
    volumeMode: Filesystem
