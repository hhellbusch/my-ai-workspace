apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.appName }}-html
  labels:
    app: {{ .Values.appName }}
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head><title>{{ .Values.appName }}</title></head>
      <body>
        <h1>{{ .Values.greeting }}</h1>
        <p>Deployed by GitOps &mdash; no <code>oc apply</code> required.</p>
      </body>
    </html>
