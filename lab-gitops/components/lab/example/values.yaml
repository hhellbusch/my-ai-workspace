# Component-level defaults (lowest specificity in the cascade).
# These values can be overridden by groups/lab-group/values.yaml
# and further overridden by cluster/lab-cluster/values.yaml.

replicaCount: 1

image:
  # nginx-unprivileged runs non-root (UID 101, port 8080), OCP restricted-v2 SCC compatible.
  repository: quay.io/nginx/nginx-unprivileged
  tag: "stable-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# The text served by the nginx pod at the Route URL.
# Change this to see your message appear in the browser after pushing.
greeting: "Hello from example!"

# Used as the base name for all Kubernetes resources created by this chart,
# and as the namespace they are deployed into.
# When you copy this component, change this to your own name.
appName: example
