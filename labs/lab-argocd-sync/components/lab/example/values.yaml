# Component-level defaults (lowest specificity in the cascade).
# These values can be overridden by groups/lab-group/values.yaml
# and further overridden by cluster/lab-cluster/values.yaml.
#
# When you copy this component, change appName and greeting.
# Sync settings (syncPolicy, ignoreDifferences) are NOT set here —
# they are added at the cluster level during the lab exercises.

# Used as the base name for all Kubernetes resources and as the
# namespace they are deployed into. Must be lowercase with no spaces.
appName: example

replicaCount: 1

image:
  # nginx-unprivileged runs as UID 101 on port 8080 — compatible with
  # OpenShift restricted-v2 SCC without any privilege escalation.
  repository: quay.io/nginx/nginx-unprivileged
  tag: "stable-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# The text served by the nginx pod at the Route URL.
# Change this to see your message appear in the browser after ArgoCD syncs.
greeting: "Hello from example!"
